<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team Cup - Inscrição</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- 🔥 HUD TOPO -->
  <div class="hud">
    <span>🎮 TEAM CUP</span>
    <span id="userInfo"></span>
  </div>

  <!-- 🔥 LOADING -->
  <div id="loading">
    <h1>⚡ CARREGANDO TORNEIO...</h1>
  </div>

  <h2>Montar Time</h2>

  <!-- 🔐 LOGIN -->
  <button id="btnLogin" class="btn">Login com Google</button>

  <!-- 🧾 FORMULÁRIO -->
  <div class="card">

    <input id="nome" placeholder="Seu nome"><br>

    <select id="genero">
      <option value="M">Homem</option>
      <option value="F">Mulher</option>
    </select>

    <select id="categoria">
      <option value="B">Categoria B</option>
      <option value="C">Categoria C</option>
      <option value="D">Categoria D</option>
      <option value="E">Categoria E</option>
    </select>

    <br><br>

    <button id="btnEntrar" class="btn">ENTRAR / CRIAR TIME</button>

  </div>

  <!-- 🧠 LISTA DE TIMES -->
  <div id="times"></div>

  <!-- 🔔 TOAST -->
  <div id="toast"></div>

  <!-- 🔊 SOM -->
  <audio id="enterSound" src="https://assets.mixkit.co/sfx/preview/mixkit-arcade-game-jump-coin-216.wav"></audio>

  <!-- 🚀 SCRIPT -->
  <script type="module" src="app.js"></script>

</body>

</html>
